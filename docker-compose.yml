version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ale-tm-app
    container_name: ale-tm-app
    restart: unless-stopped
    tty: true
    environment:
      SERVICE_NAME: app
      SERVICE_TAGS: dev
    volumes:
      - .:/var/www
      - /var/www/vendor
    networks:
      - ale-tm-network

  nginx:
    image: nginx:alpine
    container_name: ale-tm-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - ale-tm-network

  db:
    image: mysql:8.0
    container_name: ale-tm-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: task_management
      MYSQL_ROOT_PASSWORD: secret
    volumes:
      - ale-tm-dbdata:/var/lib/mysql
    networks:
      - ale-tm-network

networks:
  ale-tm-network:
    driver: bridge

volumes:
  ale-tm-dbdata:
    driver: local
